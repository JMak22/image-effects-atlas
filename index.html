<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Effects Atlas</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h2>Image Effects Atlas</h2>
    <p>Visual reference for image editing effects.</p>
</header>

<section id="controls">

    <label for="effectSelect">
        Blur Effect
    </label>

    <select id="effectSelect">
        <option value="gaussian">Gaussian Blur</option>
        <option value="motion">Motion Blur</option>
        <option value="lens">Lens Blur</option>
        <option value="selective">Selective Gaussian Blur</option>
    </select>

    <button id="resetButton">
        Reset
    </button>

</section>

<main class="gallery">

    <div class="card">
        <h2>Line</h2>
        <img id="line" src="effects/blur/reset/line.svg" alt="Line">
    </div>

    <div class="card">
        <h2>Circle</h2>
        <img id="circle" src="effects/blur/reset/circle.svg" alt="Circle">
    </div>

    <div class="card">
        <h2>Rectangle</h2>
        <img id="rectangle" src="effects/blur/reset/rectangle.svg" alt="Rectangle">
    </div>

    <div class="card">
        <h2>Star</h2>
        <img id="star" src="effects/blur/reset/star.svg" alt="Star">
    </div>

    <div class="card">
        <h2>Letter G</h2>
        <img id="letter_g" src="effects/blur/reset/letter-g.svg" alt="Letter G">
    </div>

    <div class="card">
        <h2>Bezier Curve</h2>
        <img id="bezier" src="effects/blur/reset/bezier.svg" alt="Bezier Curve">
    </div>

</main>

<script src="script.js"></script>

</body>
</html>
